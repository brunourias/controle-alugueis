<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <title>Controle de Aluguéis</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="app-header">
    <div class="header-top">
        <h1>Controle de Aluguéis</h1>
        <div class="year-nav">
            <button id="prevYear" class="icon-btn" aria-label="Ano anterior">‹</button>
            <span id="yearLabel">2026</span>
            <button id="nextYear" class="icon-btn" aria-label="Próximo ano">›</button>
        </div>
    </div>
    <p class="hint">Toque numa célula para alternar: <span class="chip chip-pago">Recebido</span><span class="chip chip-atrasado">Atrasado</span><span class="chip chip-pendente">Pendente</span></p>
</header>

<main>
    <div class="table-wrap">
        <table id="grid">
            <thead></thead>
            <tbody></tbody>
            <tfoot></tfoot>
        </table>
    </div>

    <div id="empty" class="empty" hidden>
        <p>Nenhuma unidade cadastrada ainda.</p>
        <p>Toque em <strong>+ Nova unidade</strong> para começar.</p>
    </div>

    <div class="summary" id="summary"></div>
</main>

<button id="addUnit" class="fab" aria-label="Nova unidade">+ Nova unidade</button>

<!-- Modal de unidade -->
<div class="modal-backdrop" id="modal" hidden>
    <div class="modal">
        <h2 id="modalTitle">Nova unidade</h2>
        <label> Nome da unidade
            <input type="text" id="unitName" placeholder="Ex.: Unidade 01" autocomplete="off" />
        </label>
        <label>Valor do aluguel (R$)
            <input type="number" id="unitRent" placeholder="Ex.: 1200" inputmode="decimal" min="0" step="0.01" />
        </label>
        <div class="modal-actions">
            <button id="deleteUnit" class="btn btn-danger" hidden>Excluir</button>
            <span class="spacer"></span>
            <button id="cancelModal" class="btn btn-ghost">Cancelar</button>
            <button id="saveUnit" class="btn btn-primary">Salvar</button>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
